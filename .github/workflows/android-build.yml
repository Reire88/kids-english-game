name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # IMPORTANT: do NOT use gradle/actions/setup-gradle (it enables caching)
      - name: Download Gradle 8.7 (no cache)
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Build debug APK
       run: gradle :app:assembleDebug --no-daemon --stacktrace
       
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kids-english-game-apk
          path: app/build/outputs/apk/debug/app-debug.apk
